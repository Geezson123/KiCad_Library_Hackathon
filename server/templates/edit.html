{% extends "base.html" %}
{% block title %}Edit {{ part.name }}{% endblock %}
{% block content %}
<div class="page-head">
  <h1>Edit part #{{ part.id }}</h1>
  <a class="btn" href="{{ url_for('part_detail', part_id=part.id) }}">← Cancel</a>
</div>

<form class="card form" method="post" action="{{ url_for('edit_part', part_id=part.id) }}" enctype="multipart/form-data">
  <div class="grid2">
    <label>KiCad name <span class="hint">(shown in the Symbol Chooser)</span>
      <input name="name" value="{{ part.name }}">
    </label>
    <label>Category
      <select name="category">
        {% for c in categories %}
          <option value="{{ c }}" {{ 'selected' if c == part.category else '' }}>{{ c }}</option>
        {% endfor %}
      </select>
    </label>
    <label>MPN
      <input name="mpn" value="{{ part.mpn }}">
    </label>
    <label>Manufacturer
      <input name="manufacturer" value="{{ part.manufacturer }}">
    </label>
    <label>Value
      <input name="value" value="{{ part.value }}">
    </label>
    <label>Your name
      <input name="created_by" value="{{ part.created_by }}" disabled>
    </label>
    <label class="span2">Description
      <input name="description" value="{{ part.description }}">
    </label>
    <label class="span2">Datasheet URL
      <input name="datasheet" type="url" value="{{ part.datasheet }}">
    </label>
    <label class="span2">Keywords
      <input name="keywords" value="{{ part.keywords }}">
    </label>
  </div>

  <h3>Replace files <span class="hint">(optional — leave blank to keep the current file)</span></h3>
  <div class="grid2">
    <label class="file">Symbol (.kicad_sym)
      <input type="file" name="symbol" accept=".kicad_sym">
      <span class="hint">current: <code>{{ part.symbols or '—' }}</code></span>
    </label>
    <label class="file">Footprint (.kicad_mod)
      <input type="file" name="footprint" accept=".kicad_mod">
      <span class="hint">current: <code>{{ part.footprints or '—' }}</code></span>
    </label>
    <label class="file span2">3D model (.step / .stp / .wrl)
      <input type="file" name="model" accept=".step,.stp,.stpz,.wrl">
      <span class="hint">current: <code>{{ part.model3d or '—' }}</code></span>
    </label>
  </div>

  <div class="actions">
    <button class="btn primary" type="submit">Save changes</button>
    <a class="btn" href="{{ url_for('part_detail', part_id=part.id) }}">Cancel</a>
  </div>
</form>
{% endblock %}
